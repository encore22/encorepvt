version: '3.8'
services:
  telegram-bot:
    image: your_telegram_bot_image
    ports:
      - "8000:8080"
  device-manager:
    image: your_device_manager_image
    ports:
      - "8001:8080"
    environment:
      - DEVICE_MANAGER_URL=http://device-manager:8080
  device-automation:
    image: your_device_automation_image
    ports:
      - "8002:8080"
    environment:
      - DEVICE_AUTOMATION_URL=http://device-automation:8080